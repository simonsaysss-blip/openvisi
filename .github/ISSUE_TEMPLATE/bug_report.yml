name: Bug report
description: Report a reproducible OpenVisi bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: OpenVisi version or commit
      description: Paste the npm package version, git commit, or branch.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Include the exact command and relevant options.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: artifact-stage
    attributes:
      label: Artifact stage
      options:
        - dry-run
        - static-crawl
        - evaluation
        - measurement-inputs
        - metrics-draft
        - metrics-review
        - metrics-finalization
        - debug-report
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or artifact snippets
      description: Remove secrets and private crawl content before posting.
      render: text
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: node --version
